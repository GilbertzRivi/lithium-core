name: ci

on:
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # The toolchain (channel + rustfmt/clippy components) is pinned in
  # rust-toolchain.toml, so every job just runs cargo and rustup resolves it.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  doc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features

  # Smoke-run every fuzz target for a few seconds so a broken harness or an
  # immediate crash is caught in CI. cargo-fuzz needs nightly for the sanitizer.
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # Pin the gnu target: the sanitizer cargo-fuzz injects cannot link against
      # musl's static libc, and the runner otherwise defaults the build to musl.
      - name: Smoke-run each target
        run: |
          for t in keyfile_parse secret_json opaque_parse kyberbox_decrypt \
                   aead_decrypt sign_verify pow_verify; do
            echo "::group::$t"
            cargo +nightly fuzz run "$t" --target x86_64-unknown-linux-gnu -- -runs=20000 -max_total_time=20
            echo "::endgroup::"
          done
