name: ci

on:
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # The toolchain (channel + rustfmt/clippy components) is pinned in
  # rust-toolchain.toml, so every job just runs cargo and rustup resolves it.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  # Build-only check for the mobile targets the threat model documents
  # (arena memory-locking behavior). `cargo check` does not link, so Android
  # cross-compiles from Linux; iOS needs the Apple SDK, so it runs on macOS.
  cross:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-linux-android
          - os: macos-latest
            target: aarch64-apple-ios
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo check --all-features --target ${{ matrix.target }}

  doc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features

  # AddressSanitizer over the arena tests - arena.rs is the crate's only unsafe.
  # gnu target so RUSTFLAGS instrument only target crates; nightly for -Zsanitizer.
  asan:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -Zsanitizer=address
      ASAN_OPTIONS: detect_leaks=0
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      # Skip the VmLck-accounting test: the sanitizer's mmap interception zeroes it out.
      - name: Arena unit tests under ASan
        run: cargo +nightly test --lib --target x86_64-unknown-linux-gnu secrets::arena -- --skip arena_pages_are_actually_mlocked
      - name: KeyManager arena integration tests under ASan
        run: cargo +nightly test --test keymanager_arena_tests --target x86_64-unknown-linux-gnu

  # Smoke-run every fuzz target for a few seconds so a broken harness or an
  # immediate crash is caught in CI. cargo-fuzz needs nightly for the sanitizer.
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # Pin the gnu target: the sanitizer cargo-fuzz injects cannot link against
      # musl's static libc, and the runner otherwise defaults the build to musl.
      - name: Smoke-run each target
        run: |
          for t in keyfile_parse secret_json opaque_parse kyberbox_decrypt \
                   aead_decrypt sign_verify hpke_open hpke_setup_receiver \
                   hpke_wire double_sig hpke_stream; do
            echo "::group::$t"
            cargo +nightly fuzz run "$t" --target x86_64-unknown-linux-gnu -- -runs=20000 -max_total_time=20
            echo "::endgroup::"
          done
